name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Runner Environment Fix
        run: git config --global --add safe.directory "*"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: npm build
        # This triggers the script we added to your package.json
        run: npm run build

      - name: Archive fortexxui
        shell: powershell
        run: |
          # Ensure the dist folder actually exists before zipping
          if (Test-Path "dist") {
              Compress-Archive -Path dist -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
          } else {
              Write-Error "Build failed: 'dist' folder not found!"
              exit 1
          }

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
