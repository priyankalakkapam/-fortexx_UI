name: CI Build and Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Runner Environment Fix
        # Prevents Git ownership errors on self-hosted Windows runners
        run: git config --global --add safe.directory "*"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Ignores the ghost submodule error
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: npm build
        # Force Windows to allow the build script to run and create the 'dist' folder
        run: |
          powershell -ExecutionPolicy Bypass -Command "npm run build"

      - name: Archive fortexxui
        shell: powershell
        run: |
          # Verify the 'dist' folder exists, then zip its contents
          if (Test-Path "dist") {
              Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
              Write-Host "Success: 'dist' folder contents zipped."
          } else {
              Write-Error "Error: 'dist' folder was NOT found after npm build!"
              exit 1
          }

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
          retention-days: 5
