name: Fortexx UI CI-CD

on:
  push:
    branches:
      - main   # change if your branch is different

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      # Zip the build output (CHANGE dist if your folder is different)
      - name: Create ZIP artifact
        shell: powershell
        run: |
          if (Test-Path "dist") {
              Compress-Archive -Path "dist\*" `
                -DestinationPath "fortexxui-${{ github.run_number }}.zip" `
                -Force
          } elseif (Test-Path "build") {
              Compress-Archive -Path "build\*" `
                -DestinationPath "fortexxui-${{ github.run_number }}.zip" `
                -Force
          } else {
              Write-Error "No build output folder found (dist or build)"
              exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-*.zip

      # OPTIONAL: Azure Login (if deploying)
      - name: Azure Login
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
