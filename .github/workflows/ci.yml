name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This stops GitHub from trying to look for any submodules like FastXeUI
          submodules: false
          # We tell it NOT to persist credentials to prevent submodule sync attempts
          persist-credentials: false

      - name: Manually Remove Ghost Paths
        shell: powershell
        run: |
          # This forces Git to forget the 'Users' path exists in the index
          git rm -r --cached Users --ignore-unmatch
          Write-Host "Cleaned up old FastXeUI references."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: npm build
        run: npm run build

      - name: Archive Artifacts
        shell: powershell
        run: |
          if (Test-Path "dist") {
              Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
              Write-Host "Successfully zipped fortexxui artifact."
          } else {
              Write-Error "dist folder not found. Build might have failed."
              exit 1
          }

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
