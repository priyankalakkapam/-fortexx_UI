name: Build and Deploy to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Runner Environment Fix
        run: git config --global --add safe.directory "*"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: azure/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: npm build
        # This triggers the PowerShell script you just pushed to package.json
        run: npm run build

      - name: Archive Artifact
        shell: powershell
        run: |
          if (Test-Path "dist") {
              Compress-Archive -Path dist\* -DestinationPath fortexxui.zip -Force
          } else {
              Write-Error "dist folder missing!"
              exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui.zip

  deploy:
    runs-on: self-hosted
    needs: build
    environment: TST
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: FortexxUI

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'your-app-name' # Replace with your actual Azure Web App name
          package: fortexxui.zip
