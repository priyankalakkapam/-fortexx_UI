name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Hard Cleanup of Ghost Path
        shell: powershell
        run: |
          # This forces the local git index to forget the 'Users' folder 
          # so the checkout step doesn't crash.
          git rm -r --cached Users --ignore-unmatch
          Write-Host "Ghost path removed from index."

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This tells GitHub: "Do not try to find submodules"
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Create Dist for Azure
        shell: powershell
        run: |
          if (Test-Path "dist") { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Force -Path "dist"
          Copy-Item -Path "app.js", "package.json", "package-lock.json" -Destination "dist" -Force
          if (Test-Path "node_modules") {
              Copy-Item -Path "node_modules" -Destination "dist" -Recurse -Force
          }

      - name: Archive Artifact
        shell: powershell
        run: |
          Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
