name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This prevents the "fatal: no submodule mapping" crash
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Create Dist Folder
        shell: powershell
        run: |
          # 1. Clear old data
          if (Test-Path "dist") { Remove-Item -Recurse -Force dist }
          
          # 2. Create the physical folder you want to see in the zip
          New-Item -ItemType Directory -Force -Path "dist"
          
          # 3. Copy files into it
          Copy-Item -Path "app.js", "package.json", "package-lock.json" -Destination "dist" -Force
          if (Test-Path "node_modules") {
              Copy-Item -Path "node_modules" -Destination "dist" -Recurse -Force
          }

      - name: Archive fortexxui
        shell: powershell
        run: |
          # We zip the 'dist' folder itself so it appears as a folder when unzipped
          Compress-Archive -Path dist -DestinationPath fortexxui-${{ github.run_number }}.zip -Force

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
