name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Force Clean Ghost Path
        shell: powershell
        run: |
          # This stops the "no submodule mapping" error before it starts
          git rm -r --cached Users --ignore-unmatch
          Write-Host "Cleaned ghost submodule reference."

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Create Dist Folder Structure
        shell: powershell
        run: |
          # 1. Delete old dist if it exists and create a fresh one
          if (Test-Path "dist") { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Force -Path "dist"
          
          # 2. Copy your app files INTO the dist folder
          Copy-Item -Path "app.js", "package.json", "package-lock.json" -Destination "dist" -Force
          
          # 3. Copy node_modules into dist (this makes it a working folder)
          if (Test-Path "node_modules") {
              Copy-Item -Path "node_modules" -Destination "dist" -Recurse -Force
          }
          Write-Host "Success: 'dist' folder created with all files."

      - name: Archive fortexxui
        shell: powershell
        run: |
          # This zips the DIST folder itself so it looks like your screenshot
          Compress-Archive -Path dist -DestinationPath fortexxui-${{ github.run_number }}.zip -Force

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
