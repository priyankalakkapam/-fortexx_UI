name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This is the key: we tell GitHub to ignore the ghost submodules during checkout
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Archive Project Files
        shell: powershell
        run: |
          # We grab everything except system folders. 
          # Even if node_modules is acting up, this will find it.
          $items = Get-ChildItem -Path . -Exclude ".git", ".github", "Users"
          Write-Host "Zipping these items: $($items.Name)"
          Compress-Archive -Path $items -DestinationPath fortexxui-${{ github.run_number }}.zip -Force

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
