name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: npm build
        run: npm run build

      - name: Locate and Archive Build Output
        shell: powershell
        run: |
          # 1. List files to help us debug if it fails again
          Write-Host "Listing files in the current directory:"
          ls
          
          # 2. Check for 'dist' or 'build' or 'out'
          $targetFolder = ""
          if (Test-Path "dist") { $targetFolder = "dist" }
          elseif (Test-Path "build") { $targetFolder = "build" }
          elseif (Test-Path "out") { $targetFolder = "out" }

          if ($targetFolder -ne "") {
              Write-Host "Found output in '$targetFolder'. Archiving..."
              Compress-Archive -Path "$targetFolder\*" -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
          } else {
              Write-Error "Could not find 'dist', 'build', or 'out' folders. Check your package.json build script."
              exit 1
          }

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
