name: Build and Publish Dist Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # Using your specific self-hosted Windows runner
    runs-on: self-hosted
    # Using your TST environment
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Ignoring the problematic ghost submodule path seen in your repo
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: npm build
        # This must create the 'dist' folder
        run: npm run build

      - name: Verify and Archive dist folder
        shell: powershell
        run: |
          # Check if the dist folder was created by the build script
          if (Test-Path "dist") {
              Write-Host "Dist folder found. Archiving..."
              # Zipping the contents of dist to match your Azure artifact
              Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
          } else {
              Write-Error "Error: 'dist' folder was not generated. Check your npm build script in package.json."
              exit 1
          }

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          # Naming it FortexxUI to match your desired output
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
          retention-days: 5
