name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This is the "magic" fix for your specific error
          submodules: false
          # This tells GitHub to ignore the broken submodule entry
          persist-credentials: false 

      - name: Force Remove Bad Git Paths
        # This step manually deletes the problematic folder entry if it exists
        shell: powershell
        run: |
          if (Test-Path "Users") {
            Remove-Item -Recurit -Force Users
            Write-Host "Cleaned up the problematic Users folder."
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: npm build
        run: npm run build

      - name: Archive Artifacts
        shell: powershell
        run: |
          if (Test-Path "dist") {
              Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
          } else {
              Write-Error "Build output (dist) folder not found."
              exit 1
          }

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
