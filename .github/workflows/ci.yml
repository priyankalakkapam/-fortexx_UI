name: Fortexx UI CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Verify Node version (like Azure agent)
      - name: Check Node Version
        run: node -v

      # Install dependencies
      - name: Install Packages
        run: npm install

      # Build project
      - name: Build Project
        run: npm run build

      # Archive build output (same like Azure Archive task)
      - name: Archive Build
        shell: powershell
        run: |
          if (Test-Path "dist") {
              Compress-Archive -Path "dist\*" -DestinationPath "fortexxui-${{ github.run_number }}.zip" -Force
          } elseif (Test-Path "build") {
              Compress-Archive -Path "build\*" -DestinationPath "fortexxui-${{ github.run_number }}.zip" -Force
          } else {
              Write-Error "Build output folder not found"
              exit 1
          }

      # Upload artifact (same like Publish Artifact in Azure)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-*.zip
