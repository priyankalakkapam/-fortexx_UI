name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST # Matches your TST environment

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false # Prevents the FastXeUI ghost folder error

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Prepare Dist Folder
        # This step manually creates the 'dist' folder you need
        shell: powershell
        run: |
          # 1. Create the folder
          if (!(Test-Path "dist")) {
              New-Item -ItemType Directory -Force -Path "dist"
          }
          
          # 2. Copy your app files into 'dist' (matching Azure structure)
          Copy-Item -Path "app.js", "package.json", "node_modules" -Destination "dist" -Recurse -Force
          
          Write-Host "Manually created 'dist' folder and copied files."

      - name: Archive Dist Folder
        shell: powershell
        run: |
          # Zip the contents of the newly created dist folder
          Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI # Matches your FortexxUI artifact name
          path: fortexxui-${{ github.run_number }}.zip
          retention-days: 5
