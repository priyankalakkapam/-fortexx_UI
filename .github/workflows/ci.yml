name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      # We are skipping 'npm run build' because your app doesn't create a 'dist' folder
      
      - name: Archive Project Files
        shell: powershell
        run: |
          # We zip the app.js, package.json, and node_modules
          # This creates the artifact for deployment
          Compress-Archive -Path app.js, package.json, package-lock.json, node_modules -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
          Write-Host "Success: Created fortexxui-${{ github.run_number }}.zip"

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
          retention-days: 5
