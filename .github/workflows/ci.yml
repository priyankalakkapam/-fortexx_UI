name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Create Dist Folder
        shell: powershell
        run: |
          # 1. Ensure a clean dist directory exists
          if (Test-Path "dist") { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Force -Path "dist"
          
          # 2. Copy the files you just verified (node_modules + app logic)
          Copy-Item -Path "app.js", "package.json", "package-lock.json" -Destination "dist" -Force
          Copy-Item -Path "node_modules" -Destination "dist" -Recurse -Force
          
          Write-Host "Dist folder successfully prepared with node_modules."

      - name: Archive Artifact
        shell: powershell
        run: |
          # Zip the contents of the dist folder
          Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
