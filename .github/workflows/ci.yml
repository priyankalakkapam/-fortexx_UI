name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This prevents the "submodule mapping" error from stopping the build
          submodules: false 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.13.1' # Matching your local version

      - name: npm install
        run: npm install

      - name: npm build
        run: npm run build

      - name: Archive Build Folder
        # Changed 'shell: pwsh' to 'shell: powershell'
        run: |
          if (Test-Path dist) {
            Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
          } else {
            Write-Error "Dist folder not found! Build might have failed."
            exit 1
          }
        shell: powershell

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
