name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Submodule errors raakunda idhi help chestundi
          submodules: false 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Me runner lo unna version ki thaggattu

      - name: npm install
        run: npm install

      - name: npm build
        run: npm run build

      - name: Archive Build Folder
        # 'pwsh' badulu 'powershell' use chestunnam, endukante me runner lo pwsh ledhu
        run: |
          if (Test-Path dist) {
            Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
          } else {
            Write-Host "Error: dist folder kanapadaledhu!"
            exit 1
          }
        shell: powershell

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
