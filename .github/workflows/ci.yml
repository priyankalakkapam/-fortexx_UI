name: CI Build and Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Runner Environment Fix
        run: git config --global --add safe.directory "*"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Manual Build (Force Create Dist)
        # Ikkada manam direct ga Windows commands vaadi folder create chesthunnam
        shell: cmd
        run: |
          if exist dist rmdir /s /q dist
          mkdir dist
          echo D | xcopy app.js dist\ /y
          echo D | xcopy package.json dist\ /y
          xcopy node_modules dist\node_modules\ /s /e /y /i

      - name: Verify Folder Existence
        shell: cmd
        run: |
          dir dist
          if exist dist (echo "SUCCESS: Dist folder is ready") else (exit 1)

      - name: Archive fortexxui
        shell: powershell
        run: |
          # Zipping the verified dist folder
          Compress-Archive -Path dist\* -DestinationPath fortexxui.zip -Force

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui.zip
