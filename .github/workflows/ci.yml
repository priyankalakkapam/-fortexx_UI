name: CI Build and Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    # TST environment configuration
    environment: TST

    steps:
      - name: Runner Environment Fix
        # Windows runner meedha Git ownership issues raakunda untundhi
        run: git config --global --add safe.directory "*"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: npm build
        # Mee package.json lo unna script ikkada dist folder ni create chesthundhi
        run: npm run build

      - name: Archive fortexxui
        shell: powershell
        run: |
          # dist folder contents ni zip chesthunnam
          if (Test-Path "dist") {
              Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
              Write-Host "Successfully created zip from dist folder."
          } else {
              Write-Error "Error: 'dist' folder was not found. Check your npm build script."
              exit 1
          }

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
          retention-days: 5
