name: Fortexx UI CI

on:
  push:
    branches:
      - main   # change if needed

jobs:
  build:
    runs-on: self-hosted   # because you created self-hosted runner
    environment: TST       # your GitHub environment name

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'   # change if your project uses different version

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      # Create zip like Azure artifact
      - name: Archive build
        run: |
          mkdir artifact
          powershell Compress-Archive -Path .\dist\* -DestinationPath artifact\fortexxui-${{ github.run_number }}.zip

      # Upload artifact (same like Azure "Publish Artifact")
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: artifact/*.zip
