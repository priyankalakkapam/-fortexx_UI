name: Build and Publish Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    # Links to the environment you created in your screenshots
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Now that we cleaned the repo, this will be much faster
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: npm build
        run: npm run build

      - name: Archive Build Output
        shell: powershell
        run: |
          # Check if dist folder exists after npm build
          if (Test-Path "dist") {
              Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
              Write-Host "Success: Created fortexxui-${{ github.run_number }}.zip"
          } else {
              Write-Error "Error: 'dist' folder not found. Check build logs above."
              exit 1
          }

      - name: Publish Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
          retention-days: 5
