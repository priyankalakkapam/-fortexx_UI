name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Agent job 1
    runs-on: self-hosted

    environment: TST

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. npm install
      - name: npm install
        shell: cmd
        run: npm install

      # 4. Archive the app files
      - name: Archive app
        shell: cmd
        run: |
          tar -czf build-artifact.tar.gz app.js package.json

      # 5. Publish Artifact
      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build-artifact.tar.gz
          retention-days: 30

      # 6. Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 7. Deploy to Azure (update with your actual Azure service details)
      - name: Deploy to Azure
        shell: cmd
        run: |
          echo Add your Azure deployment command here
          rem Example for Azure Web App:
          rem az webapp deploy --resource-group YOUR_RG --name YOUR_APP_NAME --src-path build-artifact.tar.gz
