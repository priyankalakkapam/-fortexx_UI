name: Fortexx UI CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - uses: actions/checkout@v4

      - name: Check Node Version
        run: node -v

      - name: Install Packages
        run: npm install

      # Zip entire project (excluding node_modules)
      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path * `
            -DestinationPath "fortexxui-${{ github.run_number }}.zip" `
            -Force

      - uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-*.zip
