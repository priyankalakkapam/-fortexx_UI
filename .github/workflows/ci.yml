name: CI Build and Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Runner Environment Fix
        # Fixes git ownership issues on Windows
        run: git config --global --add safe.directory "*"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Build Script
        # CRITICAL: We use 'cmd' because your package.json uses Windows 'xcopy' and 'if exist'
        shell: cmd
        run: npm run build

      - name: Archive fortexxui
        # We use 'powershell' for zipping as it is more reliable for compression
        shell: powershell
        run: |
          if (Test-Path "dist") {
              Compress-Archive -Path dist\* -DestinationPath fortexxui-${{ github.run_number }}.zip -Force
              Write-Host "Success: 'dist' folder contents zipped."
          } else {
              Write-Error "Error: 'dist' folder was NOT found! Check the 'Run Build Script' logs."
              exit 1
          }

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FortexxUI
          path: fortexxui-${{ github.run_number }}.zip
          retention-days: 5
